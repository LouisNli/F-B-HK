services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: fnb-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fnb_db}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fnb-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fnb_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development mode with hot reload)
  backend:
    build:
      context: ../fnb-backend
      dockerfile: Dockerfile
      target: builder
    container_name: fnb-backend-dev
    restart: unless-stopped
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-fnb_db}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ../fnb-backend/src:/app/src:ro
      - ../fnb-backend/package.json:/app/package.json:ro
    ports:
      - "3000:3000"
    networks:
      - fnb-network-dev
    depends_on:
      database:
        condition: service_healthy

  # Frontend (Development mode with Vite dev server)
  frontend:
    build:
      context: ../fnb-front
      dockerfile: Dockerfile
      target: development
    container_name: fnb-frontend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000
    volumes:
      - ../fnb-front/src:/app/src
      - ../fnb-front/public:/app/public
      - ../fnb-front/index.html:/app/index.html
      - ../fnb-front/vite.config.ts:/app/vite.config.ts
    ports:
      - "5173:5173"
    networks:
      - fnb-network-dev
    depends_on:
      - backend

networks:
  fnb-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
